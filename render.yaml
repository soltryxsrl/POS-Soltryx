# Render Blueprint — backend (NestJS) + Postgres para T1ET POS.
# El client (Next.js) va aparte en Vercel.
#
# Al conectar este repo en Render (New → Blueprint), Render lee este archivo,
# crea la base de datos y el web service, e inyecta DATABASE_URL automáticamente.
databases:
  - name: t1et-db
    plan: free
    databaseName: t1et_pos
    user: t1et_app

services:
  - type: web
    name: t1et-server
    runtime: node
    plan: free
    rootDir: server
    region: oregon
    # --prod=false fuerza instalar devDependencies (nest CLI, tsc) aunque
    # NODE_ENV=production esté presente en el build; sin esto `nest build` no existe.
    buildCommand: corepack enable && pnpm install --prod=false --frozen-lockfile && pnpm build
    startCommand: node dist/database/seeds/run-seed.js && node dist/main.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: t1et-db
          property: connectionString
      - key: DB_SSL
        value: "true"
      - key: NODE_ENV
        value: production
      - key: TZ
        value: America/Santo_Domingo
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: none
      # Vacío = sin atributo Domain (necesario cross-site con Vercel).
      - key: COOKIE_DOMAIN
        value: ""
      # Se actualiza con la URL real de Vercel tras desplegar el client.
      - key: WEB_ORIGIN
        value: https://CHANGEME.vercel.app
